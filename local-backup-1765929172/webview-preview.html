<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperçu Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1e1e1e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .phone-container {
            width: 100%;
            max-width: 380px;
            aspect-ratio: 9/16;
            background: #000;
            border-radius: 40px;
            border: 12px solid #1a1a1a;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .phone-notch {
            height: 28px;
            background: #000;
            border-radius: 0 0 20px 20px;
            width: 150px;
            margin: 0 auto;
        }

        .phone-screen {
            flex: 1;
            overflow: auto;
            background: #fff;
            position: relative;
        }

        .phone-screen iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: #000;
            color: #fff;
            font-size: 12px;
            height: 20px;
        }

        .status-bar .time {
            font-weight: bold;
        }

        .status-bar .signal {
            display: flex;
            gap: 2px;
        }

        .signal-dot {
            width: 2px;
            height: 8px;
            background: #fff;
        }

        .phone-button {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 30px;
            background: #555;
            border-radius: 0 3px 3px 0;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        button {
            padding: 8px 16px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        button:hover {
            background: #005a9e;
        }

        .url-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div>
        <input type="text" class="url-input" id="urlInput" placeholder="http://localhost:8000" value="http://localhost:8000">
        <div class="phone-container">
            <div class="status-bar">
                <span class="time" id="time">9:41</span>
                <div class="signal">
                    <div class="signal-dot"></div>
                    <div class="signal-dot"></div>
                    <div class="signal-dot"></div>
                </div>
            </div>
            <div class="phone-screen">
                <iframe id="preview" src="http://localhost:8000"></iframe>
                <div class="phone-button"></div>
            </div>
        </div>
        <div class="controls">
            <button onclick="reloadPreview()">🔄 Recharger</button>
            <button onclick="openExternal()">🔗 Ouvrir</button>
        </div>
    </div>

    <script>
        // Mettre à jour l'heure
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').textContent = 
                String(now.getHours()).padStart(2, '0') + ':' + 
                String(now.getMinutes()).padStart(2, '0');
        }, 1000);

        // Changer l'URL
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const url = document.getElementById('urlInput').value;
                document.getElementById('preview').src = url;
            }
        });

        function reloadPreview() {
            document.getElementById('preview').contentWindow.location.reload();
        }

        function openExternal() {
            const url = document.getElementById('urlInput').value;
            window.open(url, '_blank');
        }

        // Reload automatique toutes les 2 secondes (détection de changements)
        // Commentez si c'est trop agressif
        // setInterval(() => reloadPreview(), 2000);
    </script>
</body>
</html>
