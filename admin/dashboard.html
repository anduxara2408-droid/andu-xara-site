<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard • Administration Andu-Xara</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body {
            background: #f8f9fa;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .header h1 {
            color: #e67e22;
            font-size: 1.8rem;
        }
        .header h1 small {
            color: #6c757d;
            font-size: 0.9rem;
            margin-left: 10px;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: #c82333;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #e67e22;
        }
        .stat-label {
            color: #6c757d;
            margin-top: 5px;
        }
        .section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .section h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .ticket-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .ticket-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .ticket-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status-active { background: #27ae60; color: white; }
        .status-inactive { background: #e74c3c; color: white; }
        .status-used { background: #95a5a6; color: white; }
        .btn-sm {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

<script>
// ===== PROTECTION ADMIN - Vérifier l'authentification =====
if (localStorage.getItem('adminAuth') !== 'true') {
    window.location.href = 'access.html';
}
</script>

<div class="container" style="max-width: 1200px; margin: 0 auto;">
    <div class="header">
        <h1>📊 Dashboard Administrateur <small>Andu-Xara</small></h1>
        <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-number" id="totalTickets">0</div>
            <div class="stat-label">Total billets</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="activeTickets">0</div>
            <div class="stat-label">Billets actifs</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="usedTickets">0</div>
            <div class="stat-label">Billets utilisés</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="revenue">0 MRU</div>
            <div class="stat-label">Chiffre d'affaires</div>
        </div>
    </div>

    <div class="section">
        <h2>🎫 Derniers billets</h2>
        <div class="ticket-list" id="ticketList">
            <p style="text-align:center; padding:20px;">Chargement...</p>
        </div>
    </div>

    <div class="section">
        <h2>🔗 Accès rapide</h2>
        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
            <a href="concert-dashboard.html" style="background: #e67e22; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none;">🎤 Concert Pispa</a>
            <a href="validation/scan.html" style="background: #27ae60; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none;">📷 Scanner billets</a>
            <a href="../billetterie.html" style="background: #3498db; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none;">🎟️ Page billetterie</a>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC-OHtqpgOZI9AIb_WotYbiUS2L-Ac5vII",
        authDomain: "andu-xara-promo-codes-ff69e.firebaseapp.com",
        projectId: "andu-xara-promo-codes-ff69e",
        storageBucket: "andu-xara-promo-codes-ff69e.firebasestorage.app",
        messagingSenderId: "653516716143",
        appId: "1:653516716143:web:08ee1425191b4a1766359a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    async function loadStats() {
        const snapshot = await db.collection('tickets').get();
        let total = 0, active = 0, used = 0, revenue = 0;
        snapshot.forEach(doc => {
            const t = doc.data();
            total++;
            if (t.active) active++;
            if (t.used) used++;
            revenue += t.price || 0;
        });
        document.getElementById('totalTickets').textContent = total;
        document.getElementById('activeTickets').textContent = active;
        document.getElementById('usedTickets').textContent = used;
        document.getElementById('revenue').textContent = revenue + ' MRU';
    }

    async function loadRecentTickets() {
        const snapshot = await db.collection('tickets').orderBy('purchasedAt', 'desc').limit(10).get();
        const container = document.getElementById('ticketList');
        if (snapshot.empty) {
            container.innerHTML = '<p style="text-align:center; padding:20px;">Aucun billet</p>';
            return;
        }
        container.innerHTML = '';
        snapshot.forEach(doc => {
            const t = doc.data();
            const statusClass = t.used ? 'status-used' : (t.active ? 'status-active' : 'status-inactive');
            const statusText = t.used ? 'Utilisé' : (t.active ? 'Actif' : 'Inactif');
            container.innerHTML += `
                <div class="ticket-item">
                    <div>
                        <strong>${t.ticketId?.substring(0, 20)}...</strong><br>
                        <small>${t.concertName || 'Pispa Le Roi'}</small>
                    </div>
                    <div>
                        <span class="ticket-status ${statusClass}">${statusText}</span>
                    </div>
                    <div>${t.price || 0} MRU</div>
                </div>
            `;
        });
    }

    function logout() {
        auth.signOut().then(() => {
            localStorage.removeItem('adminAuth');
            window.location.href = 'access.html';
        });
    }

    loadStats();
    loadRecentTickets();
</script>
</body>
</html>
