<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Scanner • Concert Pispa Le Roi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #1a1a1a; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #e67e22, #d35400); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .event-info { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .agent-badge { background: #e67e22; color: white; padding: 5px 15px; border-radius: 20px; }
        .scanner-container { width: 100%; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 20px; }
        #video { width: 100%; height: auto; display: block; }
        .scan-status { background: #333; color: white; padding: 10px; text-align: center; font-size: 14px; margin-bottom: 20px; border-radius: 10px; }
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 1rem; width: 100%; margin: 5px 0; }
        .btn-primary { background: #e67e22; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .manual-section { background: white; padding: 20px; border-radius: 15px; }
        .manual-input { display: flex; gap: 10px; margin-top: 15px; }
        .manual-input input { flex: 1; padding: 15px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .result-card { background: white; border-radius: 15px; padding: 20px; margin-top: 20px; display: none; }
        .result-card h3 { color: #e67e22; margin-bottom: 15px; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .info-row:last-child { border-bottom: none; }
        .status-valid { background: #27ae60; color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .status-invalid { background: #e74c3c; color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .status-used { background: #95a5a6; color: white; padding: 5px 15px; border-radius: 20px; display: inline-block; }
        .big-text { font-size: 1.2rem; font-weight: bold; }
        @media (max-width: 768px) { .manual-input { flex-direction: column; } }
    </style>
</head>
<body>

<script>
if (localStorage.getItem('adminAuth') !== 'true') {
    window.location.href = '../access.html';
}
</script>

<div class="container">
    <div class="header">
        <h1>📷 Scanner billets</h1>
        <p>Pispa Le Roi - 10ème jour Tabaski 2026</p>
    </div>

    <div class="event-info">
        <span>🎤 Pispa Le Roi</span>
        <span class="agent-badge" id="agentName">Agent</span>
    </div>

    <div class="scanner-container">
        <video id="video" playsinline autoplay muted></video>
    </div>

    <div class="scan-status" id="scanStatus">
        🔍 Scanner actif - Cadrez le QR code
    </div>

    <div class="manual-section">
        <h3 style="color:#e67e22;">🔍 Saisie manuelle</h3>
        <div class="manual-input">
            <input type="text" id="ticketId" placeholder="ID du billet (ex: PRE-00001)">
            <button class="btn btn-primary" onclick="checkTicketManually()">Vérifier</button>
        </div>
    </div>

    <div id="resultCard" class="result-card">
        <h3>🎫 Informations billet</h3>
        <div id="resultContent"></div>
        <button id="validateBtn" class="btn btn-success" style="display:none;" onclick="validateEntry()">✅ VALIDER L'ENTRÉE</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC-OHtqpgOZI9AIb_WotYbiUS2L-Ac5vII",
        authDomain: "andu-xara-promo-codes-ff69e.firebaseapp.com",
        projectId: "andu-xara-promo-codes-ff69e",
        storageBucket: "andu-xara-promo-codes-ff69e.firebasestorage.app",
        messagingSenderId: "653516716143",
        appId: "1:653516716143:web:08ee1425191b4a1766359a"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentTicket = null;
    let scanning = true;
    let stream = null;
    let animationId = null;

    const agentName = localStorage.getItem('agentName') || 'Agent';
    document.getElementById('agentName').textContent = agentName;

    // ===== DÉMARRER LA CAMÉRA =====
    async function startCamera() {
        const video = document.getElementById('video');
        const scanStatus = document.getElementById('scanStatus');
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: { exact: "environment" } } 
            });
            video.srcObject = stream;
            await video.play();
            scanStatus.textContent = '🔍 Scanner actif - Cadrez le QR code';
            scanStatus.style.background = '#27ae60';
            startScanning();
        } catch (err) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                await video.play();
                scanStatus.textContent = '🔍 Scanner actif - Cadrez le QR code';
                scanStatus.style.background = '#27ae60';
                startScanning();
            } catch (err2) {
                scanStatus.textContent = '❌ Caméra inaccessible - Utilisez la saisie manuelle';
                scanStatus.style.background = '#e74c3c';
            }
        }
    }

    // ===== SCANNER EN CONTINU =====
    function startScanning() {
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        const context = canvas.getContext('2d');
        
        function scanFrame() {
            if (!scanning || !video.videoWidth) {
                animationId = requestAnimationFrame(scanFrame);
                return;
            }
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, canvas.width, canvas.height);
            
            if (code) {
                let ticketId = code.data;
                try {
                    const json = JSON.parse(ticketId);
                    ticketId = json.tid || json.ticketId || json.id || ticketId;
                } catch(e) {}
                
                if (ticketId.length > 5) {
                    scanning = false;
                    stopCamera();
                    document.getElementById('scanStatus').textContent = '✅ QR code détecté !';
                    document.getElementById('ticketId').value = ticketId;
                    checkTicket(ticketId);
                    return;
                }
            }
            
            animationId = requestAnimationFrame(scanFrame);
        }
        
        scanFrame();
    }

    function stopCamera() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
        }
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
    }

    // ===== VÉRIFIER LE BILLET =====
    window.checkTicketManually = function() {
        const ticketId = document.getElementById('ticketId').value.trim();
        if (!ticketId) { alert("Entrez un ID"); return; }
        checkTicket(ticketId);
    };

    async function checkTicket(ticketId) {
        const doc = await db.collection('tickets').doc(ticketId).get();
        const resultCard = document.getElementById('resultCard');
        const resultContent = document.getElementById('resultContent');
        const validateBtn = document.getElementById('validateBtn');

        if (!doc.exists) {
            resultContent.innerHTML = `<div class="info-row"><strong>❌ Billet introuvable</strong></div>`;
            resultCard.style.display = 'block';
            validateBtn.style.display = 'none';
            return;
        }

        const t = doc.data();
        currentTicket = { id: ticketId, ...t };

        let statusHtml = '';
        let canValidate = false;

        if (t.used) {
            statusHtml = `<span class="status-used">❌ DÉJÀ UTILISÉ - Entrée refusée</span>`;
            canValidate = false;
        } else if (!t.active) {
            statusHtml = `<span class="status-invalid">⏳ EN ATTENTE DE PAIEMENT</span>`;
            canValidate = false;
        } else {
            statusHtml = `<span class="status-valid">✅ VALIDE - Entrée autorisée</span>`;
            canValidate = true;
        }

        resultContent.innerHTML = `
            <div class="info-row"><strong>ID:</strong> ${t.ticketId}</div>
            <div class="info-row"><strong>Concert:</strong> ${t.concertName || 'Pispa Le Roi'}</div>
            <div class="info-row"><strong>Type:</strong> ${t.ticketTypeName || t.ticketType}</div>
            <div class="info-row"><strong>Client:</strong> ${t.userName || t.userEmail || 'Non renseigné'}</div>
            <div class="info-row"><strong>Prix:</strong> ${t.price} MRU</div>
            <div class="info-row"><strong>Statut:</strong> ${statusHtml}</div>
        `;

        resultCard.style.display = 'block';
        
        if (canValidate) {
            validateBtn.style.display = 'block';
            validateBtn.textContent = '✅ VALIDER L\'ENTRÉE';
            validateBtn.style.background = '#27ae60';
        } else {
            validateBtn.style.display = 'block';
            if (t.used) {
                validateBtn.textContent = '❌ BILLET DÉJÀ UTILISÉ';
                validateBtn.style.background = '#95a5a6';
                validateBtn.disabled = true;
            } else if (!t.active) {
                validateBtn.textContent = '⏳ EN ATTENTE DE PAIEMENT';
                validateBtn.style.background = '#f39c12';
                validateBtn.disabled = true;
            }
        }
    }

    // ===== VALIDER L'ENTRÉE =====
    async function validateEntry() {
        if (!currentTicket) {
            alert("Aucun billet à valider");
            return;
        }
        
        if (currentTicket.used) {
            alert("❌ Ce billet a déjà été utilisé !");
            return;
        }
        
        if (!currentTicket.active) {
            alert("⏳ Ce billet est en attente de paiement !");
            return;
        }

        await db.collection('tickets').doc(currentTicket.id).update({
            used: true,
            usedAt: new Date(),
            validatedBy: agentName
        });

        alert(`✅ ENTRÉE VALIDÉE !`);
        
        document.getElementById('ticketId').value = '';
        document.getElementById('resultCard').style.display = 'none';
        currentTicket = null;
        
        scanning = true;
        startCamera();
    }

    // ===== INITIALISATION =====
    startCamera();
</script>
</body>
</html>
