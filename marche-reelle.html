<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marche Réelle 2026</title>
    <style>
        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #0d47a1 0%, #1976d2 50%, #42a5f5 100%);
            overflow: hidden;
            position: relative;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* SCÈNE */
        .scene {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* SOL RÉALISTE */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to top, 
                #5d4037 0%,
                #795548 20%,
                #8d6e63 50%,
                #a1887f 80%,
                #bcaaa4 100%
            );
            z-index: 1;
        }

        /* OMBRE DU PERSONNAGE */
        .shadow {
            position: absolute;
            bottom: 60px;
            width: 40px;
            height: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            filter: blur(5px);
            animation: shadowMove 1s ease-in-out infinite alternate;
        }

        /* PERSONNAGE - ANIMATION DE MARCHE NATURELLE */
        .walker {
            position: absolute;
            bottom: 60px;
            left: -150px;
            width: 80px;
            height: 180px;
            z-index: 10;
            transform-origin: bottom center;
            animation: 
                enterScene 4s ease-out forwards,
                walkNatural 1s 4s steps(8) infinite,
                moveForward 12s 4s linear forwards,
                openBagReal 2s 16s ease-out forwards,
                lookAtUser 1s 18s ease-out forwards,
                walkAwayReal 4s 19s ease-in forwards;
        }

        /* TÊTE */
        .head {
            position: absolute;
            top: 0;
            left: 25px;
            width: 40px;
            height: 40px;
            background: #ffccbc;
            border-radius: 50%;
            z-index: 5;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* COU */
        .neck {
            position: absolute;
            top: 40px;
            left: 35px;
            width: 10px;
            height: 10px;
            background: #ffccbc;
            border-radius: 2px;
        }

        /* TORSE */
        .torso {
            position: absolute;
            top: 50px;
            left: 20px;
            width: 40px;
            height: 50px;
            background: #2196f3;
            border-radius: 10px 10px 0 0;
            z-index: 3;
        }

        /* ÉPAULES */
        .shoulder {
            position: absolute;
            top: 55px;
            width: 20px;
            height: 10px;
            background: #1976d2;
            border-radius: 5px;
        }
        .shoulder.left { left: 15px; }
        .shoulder.right { left: 45px; }

        /* BRAS - ANIMATION NATURELLE DE BALANCEMENT */
        .arm {
            position: absolute;
            background: #1976d2;
            border-radius: 10px;
            transform-origin: top center;
            z-index: 2;
        }

        .upper-arm {
            width: 12px;
            height: 25px;
        }
        .lower-arm {
            width: 10px;
            height: 25px;
            transform-origin: top center;
        }

        /* Bras gauche */
        .arm-left {
            top: 60px;
            left: 15px;
            animation: swingArmLeft 1s ease-in-out infinite;
        }
        .forearm-left {
            top: 25px;
            left: 1px;
            animation: swingForearmLeft 1s ease-in-out infinite;
        }

        /* Bras droit */
        .arm-right {
            top: 60px;
            left: 53px;
            animation: swingArmRight 1s ease-in-out infinite;
        }
        .forearm-right {
            top: 25px;
            left: 1px;
            animation: swingForearmRight 1s ease-in-out infinite;
        }

        /* MAIN */
        .hand {
            position: absolute;
            width: 12px;
            height: 8px;
            background: #ffccbc;
            border-radius: 4px;
            bottom: -8px;
            left: -1px;
        }

        /* HANCHE */
        .hip {
            position: absolute;
            top: 100px;
            width: 45px;
            height: 15px;
            background: #1565c0;
            border-radius: 7px;
            left: 17px;
            z-index: 4;
        }

        /* JAMBES - MARCHE NATURELLE */
        .leg {
            position: absolute;
            background: #1565c0;
            border-radius: 8px;
            transform-origin: top center;
            z-index: 2;
        }

        .thigh {
            width: 15px;
            height: 40px;
        }
        .calf {
            width: 13px;
            height: 40px;
            transform-origin: top center;
        }

        /* Jambe gauche */
        .leg-left {
            top: 115px;
            left: 25px;
            animation: swingThighLeft 1s ease-in-out infinite;
        }
        .calf-left {
            top: 40px;
            left: 1px;
            animation: swingCalfLeft 1s ease-in-out infinite;
        }

        /* Jambe droite */
        .leg-right {
            top: 115px;
            left: 40px;
            animation: swingThighRight 1s ease-in-out infinite;
        }
        .calf-right {
            top: 40px;
            left: 1px;
            animation: swingCalfRight 1s ease-in-out infinite;
        }

        /* PIED */
        .foot {
            position: absolute;
            width: 20px;
            height: 8px;
            background: #333;
            border-radius: 10px 10px 0 0;
            bottom: -8px;
            left: -3px;
            animation: flexFoot 1s ease-in-out infinite;
        }

        /* CARTABLE */
        .backpack {
            position: absolute;
            width: 35px;
            height: 45px;
            background: #d32f2f;
            border-radius: 8px;
            top: 70px;
            left: 45px;
            z-index: 1;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transform-origin: center;
            animation: bounceWithWalk 1s ease-in-out infinite;
        }
        .backpack-strap {
            position: absolute;
            width: 5px;
            height: 30px;
            background: #b71c1c;
            border-radius: 2px;
            top: 45px;
            left: 15px;
        }

        /* TEXTE RÉEL QUI SORT */
        .text-real {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            opacity: 0;
            animation: 
                textEmerge 0.8s 16.5s ease-out forwards,
                textFloatReal 3s 17.5s ease-in-out infinite;
            text-align: center;
            pointer-events: none;
        }

        .title-real {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff9800, #ff5722, #e91e63);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 
                0 2px 10px rgba(0,0,0,0.3),
                0 0 30px rgba(255, 87, 34, 0.3);
            margin-bottom: 15px;
            font-family: 'Arial Black', sans-serif;
        }

        .subtitle-real {
            font-size: 1.8rem;
            color: white;
            font-weight: 600;
            text-shadow: 0 2px 15px rgba(0,0,0,0.7);
        }

        /* ANIMATIONS DE MARCHE NATURELLE */

        /* Entrée en scène */
        @keyframes enterScene {
            0% { transform: translateX(0); }
            100% { transform: translateX(250px); }
        }

        /* Mouvement vers l'avant */
        @keyframes moveForward {
            0% { left: -150px; }
            100% { left: calc(50% - 40px); }
        }

        /* Animation complète de marche */
        @keyframes walkNatural {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-2px) rotate(1deg); }
            50% { transform: translateY(0) rotate(0deg); }
            75% { transform: translateY(-2px) rotate(-1deg); }
        }

        /* Ombres */
        @keyframes shadowMove {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.2); opacity: 0.5; }
        }

        /* Bras gauche */
        @keyframes swingArmLeft {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(25deg); }
        }
        @keyframes swingForearmLeft {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(15deg); }
        }

        /* Bras droit */
        @keyframes swingArmRight {
            0%, 100% { transform: rotate(25deg); }
            50% { transform: rotate(-20deg); }
        }
        @keyframes swingForearmRight {
            0%, 100% { transform: rotate(15deg); }
            50% { transform: rotate(-10deg); }
        }

        /* Jambe gauche */
        @keyframes swingThighLeft {
            0%, 100% { transform: rotate(-15deg); }
            50% { transform: rotate(30deg); }
        }
        @keyframes swingCalfLeft {
            0%, 100% { transform: rotate(10deg); }
            50% { transform: rotate(-5deg); }
        }

        /* Jambe droite */
        @keyframes swingThighRight {
            0%, 100% { transform: rotate(30deg); }
            50% { transform: rotate(-15deg); }
        }
        @keyframes swingCalfRight {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(10deg); }
        }

        /* Pied */
        @keyframes flexFoot {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }

        /* Cartable qui bouge avec la marche */
        @keyframes bounceWithWalk {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Ouvrir cartable */
        @keyframes openBagReal {
            0% { transform: scale(1) rotateY(0deg); }
            100% { transform: scale(1.5) rotateY(180deg); opacity: 0; }
        }

        /* Regarder utilisateur */
        @keyframes lookAtUser {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(180deg); }
        }

        /* Partir */
        @keyframes walkAwayReal {
            0% { left: calc(50% - 40px); transform: rotateY(180deg); }
            100% { left: 100%; transform: rotateY(180deg); }
        }

        /* Texte qui émerge */
        @keyframes textEmerge {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
                filter: blur(20px);
            }
            70% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
                filter: blur(0);
            }
        }

        @keyframes textFloatReal {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -52%); }
        }

        /* PARTICULES RÉELLES */
        .particles-real {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
        }
        .particle-real {
            position: absolute;
            background: #ff9800;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 1s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                transform: translate(0, 0) scale(0);
                opacity: 0;
            }
            20% { opacity: 1; }
            100% {
                transform: translate(var(--px), var(--py)) scale(1);
                opacity: 0;
            }
        }

        /* BOUTON FERMETURE */
        .close-real {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-weight: bold;
            opacity: 0;
            animation: fadeInCloseReal 0.5s 22s forwards;
        }
        .close-real:hover {
            background: rgba(255, 0, 0, 0.3);
            border-color: #ff4444;
            transform: rotate(90deg) scale(1.1);
        }
        @keyframes fadeInCloseReal {
            to { opacity: 1; }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            body { height: 220px; }
            .walker { width: 60px; height: 150px; }
            .title-real { font-size: 2.8rem; }
            .subtitle-real { font-size: 1.4rem; }
        }
        @media (max-width: 480px) {
            body { height: 200px; }
            .walker { width: 50px; height: 130px; }
            .title-real { font-size: 2.2rem; }
            .subtitle-real { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="scene">
        <!-- Sol -->
        <div class="ground"></div>
        
        <!-- Ombre -->
        <div class="shadow" id="shadow"></div>
        
        <!-- Personnage avec marche naturelle -->
        <div class="walker">
            <!-- Tête -->
            <div class="head"></div>
            <div class="neck"></div>
            
            <!-- Torse et épaules -->
            <div class="torso"></div>
            <div class="shoulder left"></div>
            <div class="shoulder right"></div>
            
            <!-- Bras gauche -->
            <div class="arm arm-left upper-arm">
                <div class="arm forearm-left lower-arm">
                    <div class="hand"></div>
                </div>
            </div>
            
            <!-- Bras droit -->
            <div class="arm arm-right upper-arm">
                <div class="arm forearm-right lower-arm">
                    <div class="hand"></div>
                </div>
            </div>
            
            <!-- Hanche -->
            <div class="hip"></div>
            
            <!-- Jambe gauche -->
            <div class="leg leg-left thigh">
                <div class="leg calf-left calf">
                    <div class="foot"></div>
                </div>
            </div>
            
            <!-- Jambe droite -->
            <div class="leg leg-right thigh">
                <div class="leg calf-right calf">
                    <div class="foot"></div>
                </div>
            </div>
            
            <!-- Cartable -->
            <div class="backpack">
                <div class="backpack-strap"></div>
            </div>
        </div>
        
        <!-- Texte -->
        <div class="text-real">
            <div class="title-real">ANDU-XARA</div>
            <div class="subtitle-real">vous souhaite une excellente année 2026</div>
        </div>
        
        <!-- Particules -->
        <div class="particles-real" id="particles"></div>
        
        <!-- Bouton fermeture -->
        <button class="close-real" id="closeBtn">×</button>
    </div>

    <script>
        // Créer des particules réalistes
        function createRealParticles() {
            setTimeout(() => {
                const container = document.getElementById('particles');
                const colors = ['#ff9800', '#ff5722', '#e91e63', '#9c27b0', '#2196f3'];
                
                for (let i = 0; i < 50; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle-real';
                    
                    // Position centre (où est le cartable)
                    particle.style.left = '50%';
                    particle.style.top = '50%';
                    
                    // Taille
                    const size = Math.random() * 12 + 4;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    
                    // Couleur
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    
                    // Direction aléatoire mais vers le haut principalement
                    const angle = (Math.random() * Math.PI) - Math.PI/2; // -90 à +90 degrés
                    const distance = Math.random() * 100 + 50;
                    const px = Math.cos(angle) * distance;
                    const py = Math.sin(angle) * distance - 50; // Légèrement vers le haut
                    
                    particle.style.setProperty('--px', px + 'px');
                    particle.style.setProperty('--py', py + 'px');
                    
                    // Animation
                    particle.style.animationDuration = (Math.random() * 0.5 + 0.8) + 's';
                    particle.style.animationDelay = (Math.random() * 0.3) + 's';
                    
                    container.appendChild(particle);
                    
                    // Supprimer après
                    setTimeout(() => particle.remove(), 2000);
                }
            }, 16500); // Quand le cartable s'ouvre
        }
        
        // Faire bouger l'ombre avec le personnage
        function moveShadow() {
            const shadow = document.getElementById('shadow');
            const walker = document.querySelector('.walker');
            
            function updateShadow() {
                const walkerRect = walker.getBoundingClientRect();
                shadow.style.left = (walkerRect.left + 20) + 'px';
            }
            
            // Mettre à jour régulièrement
            setInterval(updateShadow, 50);
        }
        
        // Gestion fermeture
        document.getElementById('closeBtn').addEventListener('click', function() {
            document.body.style.opacity = '0';
            document.body.style.transform = 'scale(0.95)';
            document.body.style.transition = 'all 0.5s ease';
            
            localStorage.setItem('realWalkAnimation2026', 'closed');
            
            if (window.parent !== window) {
                setTimeout(() => {
                    window.parent.postMessage({ type: 'CLOSE_REAL_WALK' }, '*');
                }, 300);
            }
            
            setTimeout(() => {
                document.body.style.display = 'none';
            }, 500);
        });
        
        // Vérifier si déjà fermé
        if (localStorage.getItem('realWalkAnimation2026') === 'closed') {
            document.body.style.display = 'none';
        }
        
        // Initialiser
        document.addEventListener('DOMContentLoaded', function() {
            createRealParticles();
            moveShadow();
        });
    </script>
</body>
</html>
