<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Responsive</title>
    <style>
        body { font-family: Arial; margin: 0; padding: 20px; }
        .test-box { 
            background: #8B4513; 
            color: white; 
            padding: 20px; 
            margin: 10px 0; 
            border-radius: 10px; 
            text-align: center;
        }
        @media (max-width: 600px) {
            .test-box { background: #D2691E; font-size: 18px; }
        }
        @media (max-width: 400px) {
            .test-box { background: #FFD700; color: #333; font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="test-box">Test responsive - Change de couleur sur mobile</div>
    <p>Redimensionnez la fenêtre ou ouvrez sur téléphone.</p>
</body>
</html>
