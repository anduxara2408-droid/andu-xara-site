<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Andu-Xara</title>
    <link rel="stylesheet" href="style-min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f5f7fa; }
        .container { max-width: 800px; margin: 40px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #6a11cb; text-align: center; margin-bottom: 30px; }
        .contact-methods { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 30px 0; }
        .contact-card { background: #f8f9fa; padding: 20px; border-radius: 10px; border-left: 4px solid #6a11cb; }
        .contact-form { margin-top: 40px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #2c3e50; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; }
        button { background: linear-gradient(135deg, #6a11cb, #2575fc); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .back-link { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #6a11cb; color: white; text-decoration: none; border-radius: 8px; }
        #form-message { padding: 15px; border-radius: 8px; margin: 20px 0; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 Contactez Andu-Xara</h1>
        
        <div class="contact-methods">
            <div class="contact-card">
                <h3>📱 WhatsApp Direct</h3>
                <p><strong>+222 34 19 63 04</strong></p>
                <a href="https://wa.me/22234196304" target="_blank" style="color: #25D366; text-decoration: none;">💬 Ouvrir WhatsApp</a>
            </div>
            
            <div class="contact-card">
                <h3>📞 Téléphone</h3>
                <p><strong>+222 34 19 63 04</strong></p>
                <a href="tel:+22231037697" style="color: #667eea; text-decoration: none;">📞 Appeler maintenant</a>
            </div>
            
            <div class="contact-card">
                <h3>📧 Emails</h3>
                <p><strong>contact@andu-xara.store</strong></p>
                <p><strong>partenariat@andu-xara.store</strong></p>
                <p><strong>support@andu-xara.store</strong></p>
            </div>
        </div>

        <div class="contact-form">
            <h2>✉️ Envoyer un message</h2>
            
            <div id="form-message"></div>
            
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">Nom complet *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Téléphone</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                
                <div class="form-group">
                    <label for="subject">Sujet *</label>
                    <select id="subject" name="subject" required>
                        <option value="">Choisir...</option>
                        <option value="commande">Commande</option>
                        <option value="livraison">Livraison</option>
                        <option value="partenariat">Partenariat</option>
                        <option value="support">Support technique</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="message">Message *</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                
                <button type="submit">Envoyer le message</button>
            </form>
        </div>
        
        <a href="index.html" class="back-link">← Retour à l'accueil</a>
    </div>

    <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };
            
            const messageDiv = document.getElementById('form-message');
            
            // Option 1: Envoyer par WhatsApp (RECOMMANDÉ pour localhost)
            const whatsappMessage = `Nouveau message Andu-Xara:
            
Nom: ${formData.name}
Email: ${formData.email}
Téléphone: ${formData.phone}
Sujet: ${formData.subject}
Message: ${formData.message}`;
            
            const encodedMessage = encodeURIComponent(whatsappMessage);
            window.open(`https://wa.me/22234196304?text=${encodedMessage}`, '_blank');
            
            // Afficher confirmation
            messageDiv.innerHTML = `
                <div style="text-align: center;">
                    <h3 style="color: #25D366;">✅ Message prêt !</h3>
                    <p>WhatsApp s'ouvre avec votre message.</p>
                    <p>Envoyez-le simplement pour nous contacter.</p>
                    <p><small>Si WhatsApp ne s'ouvre pas, copiez votre message et envoyez-le au +222 34 19 63 04</small></p>
                </div>
            `;
            messageDiv.className = 'success';
            messageDiv.style.display = 'block';
            
            // Réinitialiser le formulaire
            document.getElementById('contact-form').reset();
            
            // Scroll vers le message
            messageDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
